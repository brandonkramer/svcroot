version: "2"
run:
  go: "1.26"
  issues-exit-code: 1
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - goconst
    - gocritic
    - godot
    - gosec
    - govet
    - ineffassign
    - nilerr
    - noctx
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - unused
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    godot:
      scope: all
      exclude:
        - ^[ ]*TODO
        - ^[ ]*go:build
        - ^[ ]*go:generate
        - ^[ ]*go:embed
        - ^(layout paths|root resolution|root path helpers|known-instance registry|project root discovery|registry locking \(unix\)|registry locking \(windows\)|service configuration|sentinel errors)$
      capital: true
      period: true
    nolintlint:
      require-explanation: true
      require-specific: true
    revive:
      severity: warning
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
          severity: warning
        - name: package-comments
          severity: warning
    staticcheck:
      checks:
        - all
        - -ST1003
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - goconst
          - gosec
          - prealloc
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/brandonkramer/svcroot)
    gofumpt:
      module-path: github.com/brandonkramer/svcroot
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
